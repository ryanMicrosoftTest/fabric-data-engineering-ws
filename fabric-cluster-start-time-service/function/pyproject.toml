[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B"]

[tool.black]
line-length = 120
target-version = ["py313"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=80"

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
