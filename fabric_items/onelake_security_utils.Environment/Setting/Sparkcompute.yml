enable_native_execution_engine: false
instance_pool_id: 87c1e4fc-1d30-4eb3-8017-faff1bea1578
driver_cores: 4
driver_memory: 28g
executor_cores: 4
executor_memory: 28g
dynamic_executor_allocation:
  enabled: true
  min_executors: 1
  max_executors: 9
spark_conf:
  spark.fabric.pools.skipStarterPools: true
  spark.synapse.diagnostic.emitters: spark-eh
  spark.synapse.diagnostic.emitter.spark-eh.type: AzureEventHub
  spark.synapse.diagnostic.emitter.spark-eh.categories: Log,EventLog,Metrics
  spark.synapse.diagnostic.emitter.spark-eh.secret.keyvault: https://kvfabricprodeus2rh.vault.azure.net/
  spark.synapse.diagnostic.emitter.spark-eh.filter.loggerName.match: PySparkLogger,org.apache.spark.SparkContext,org.apache.spark.api.python
  spark.synapse.diagnostic.emitter.spark-eh.filter.eventName.match: SparkListenerApplicationStart,SparkListenerApplicationEnd,SparkListenerJobStart,SparkListenerJobEnd,SparkListenerStageCompleted,SparkListene   rTaskEnd,SparkListenerExecutorAdded,SparkListenerExecutorRemoved,SparkListenerEnvironmentUpdate
  spark.synapse.diagnostic.emitter.spark-eh.filter.metricName.match: jvm.heap.used,jvm.heap.max,executor.runTime,executor.cpuTime,executor.memoryUsed,executor.diskUsed,executor.totalShuffleRead,executor.totalShuffleWrite,executor.totalGCTime
  spark.python.profile: true
  spark.synapse.diagnostic.emitter.spark-eh.secret.keyVault.secretName: spark-eh-endpoint-cxn-string
runtime_version: 1.3
