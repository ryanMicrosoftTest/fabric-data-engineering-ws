# OneLake Security Role Service — CI/CD Test Pipeline
# =====================================================
# Runs pytest on every push/PR that touches the service code.
# Publishes test results and coverage to Azure DevOps.

trigger:
  branches:
    include:
      - main
      - feature/*
      - release/*
  paths:
    include:
      - 'onelake-security-role-service/src/**'
      - 'onelake-security-role-service/tests/**'
      - 'onelake-security-role-service/.cicd/**'

pr:
  branches:
    include:
      - main
  paths:
    include:
      - 'onelake-security-role-service/src/**'
      - 'onelake-security-role-service/tests/**'

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.11'
  workingDirectory: 'onelake-security-role-service'
  artifactFeed: 'Fabric/onelake-security-feed'   # Format: 'ProjectName/FeedName' — update this

stages:
  - stage: Test
    displayName: 'Unit Tests'
    jobs:
      - job: RunTests
        displayName: 'pytest'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Use Python $(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Install dependencies'
            workingDirectory: $(workingDirectory)

          - script: |
              python -m pytest tests/ \
                --tb=short \
                --junitxml=test-results/junit.xml \
                --cov=onelake_security \
                --cov-report=xml:test-results/coverage.xml \
                --cov-report=term-missing \
                -v
            displayName: 'Run tests with coverage'
            workingDirectory: $(workingDirectory)
            env:
              PYTHONPATH: src

          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(workingDirectory)/test-results/junit.xml'
              testRunTitle: 'OneLake Security - Unit Tests'
              failTaskOnFailedTests: true
            displayName: 'Publish test results'

          - task: PublishCodeCoverageResults@2
            condition: always()
            inputs:
              summaryFileLocation: '$(workingDirectory)/test-results/coverage.xml'
            displayName: 'Publish code coverage'

  - stage: Publish
    displayName: 'Build & Publish Package'
    dependsOn: Test
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.Reason'], 'Manual')))
    jobs:
      - job: PublishWheel
        displayName: 'Build wheel → Azure Artifacts'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Use Python $(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip build twine
            displayName: 'Install build tools'

          - script: |
              python -m build --wheel
            displayName: 'Build .whl'
            workingDirectory: $(workingDirectory)

          - task: TwineAuthenticate@1
            inputs:
              artifactFeed: '$(artifactFeed)'
            displayName: 'Authenticate with Azure Artifacts'

          - script: |
              python -m twine upload \
                --repository onelake-security-feed \
                --config-file $(PYPIRC_PATH) \
                dist/*.whl \
                --skip-existing
            displayName: 'Publish to Azure Artifacts'
            workingDirectory: $(workingDirectory)
